spring:
  application:
    name: keycloak-service

  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/myrealm

server:
  port: 8081

logging:
  level:
    org.springframework: INFO

app:
  keycloak:
    admin:
      clientId: gravity-backend
      clientSecret: secret
    realm: myrealm
    serverUrl: http://localhost:8080
    defaultUserGroup: 12312-56757
    defaultUserRole: customer
    defaultUserRoleType: realm
