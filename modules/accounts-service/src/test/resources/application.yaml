spring:
  application:
    name: accounts-service
    outbox:
      limit: 10
  config:
    import: "optional:consul:"
  cloud:
    consul:
      host: localhost
      port: 8500
      discovery:
        enabled: true
        register: true
        instance-id: "${spring.application.name}:${server.port}:${random.value}"
        health-check-path: /actuator/health
        health-check-interval: 10s
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: root
    driverClassName: org.postgresql.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  # V(version)__description.sql
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  security:
    oauth2:
      client:
        registration:
          cash-service:
            client-id: test-client
            client-secret: test-secret
            authorization-grant-type: client_credentials
            scope: openid
        provider:
          accounts-service:
            issuer-uri: http://localhost:8080/realms/gravity
            token-uri: http://localhost:8080/realms/gravity/protocol/openid-connect/token
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/gravity
          jwk-set-uri: http://localhost:8080/realms/gravity/protocol/openid-connect/certs

server:
  port: 8083

logging:
  level:
    org.springframework: INFO

app:
  keycloak:
    realm: gravity
    serverUrl: http://localhost:8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
