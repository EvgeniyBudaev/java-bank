spring:
  application:
    name: cash-service
  config:
    import: "optional:consul:"
  cloud:
    consul:
      host: ${CONSUL_HOST:localhost}
      port: ${CONSUL_PORT:8500}
      discovery:
        enabled: true
        register: true
        instance-id: "${spring.application.name}:${server.port}:${random.value}"
        health-check-path: /actuator/health
        health-check-interval: 10s
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${app.keycloak.serverUrl}/realms/${app.keycloak.realm}
      client:
        provider:
          cash-service:
            issuer-uri: ${app.keycloak.serverUrl}/realms/${app.keycloak.realm}
            token-uri: ${app.keycloak.serverUrl}/realms/${app.keycloak.realm}/protocol/openid-connect/token
        registration:
          cash-service:
            client-id: ${KEYCLOAK_CLIENT_ID}
            client-secret: ${KEYCLOAK_CLIENT_SECRET}
            authorization-grant-type: client_credentials
            scope: openid

server:
  port: ${CASH_SERVICE_PORT}

logging:
  level:
    org.springframework: ${CASH_SERVICE_LOGGER_LEVEL}

app:
  keycloak:
    realm: ${KEYCLOAK_REALM}
    serverUrl: ${KEYCLOAK_BASE_URL}

management:
  endpoints:
    web:
      exposure:
        include: health,info
