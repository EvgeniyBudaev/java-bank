spring:
  application:
    name: cash-service
  config:
    import: "" # Отключаем импорт из Consul
  cloud:
    consul:
      enabled: false
      discovery:
        enabled: false
        register: false
        instance-id: "${spring.application.name}:${server.port}:${random.value}"
        healthCheckPath: /actuator/health
        healthCheckInterval: 30s
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8181/realms/myrealm
          jwk-set-uri: http://keycloak:8080/realms/myrealm/protocol/openid-connect/certs

server:
  port: 8086

logging:
  level:
    org.springframework: INFO

app:
  keycloak:
    realm: gravity
    externalUrl: http://localhost:8181
    internalUrl: http://keycloak:8080

management:
  endpoints:
    web:
      exposure:
        include: health,info