spring:
  application:
    name: cash-service
    outbox:
      limit: 10
  config:
    import: "" # Отключаем импорт из Consul
  cloud:
    consul:
      enabled: false
      discovery:
        enabled: false
        register: false
        instance-id: "${spring.application.name}:${server.port}:${random.value}"
        healthCheckPath: /actuator/health
        healthCheckInterval: 30s
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: root
    driverClassName: org.postgresql.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  security:
    oauth2:
      client:
        registration:
          cash-service:
            client-id: test-client
            client-secret: test-secret
            authorization-grant-type: client_credentials
            scope: openid
        provider:
          cash-service:
            issuer-uri: http://localhost:8080/realms/gravity
            token-uri: http://localhost:8080/realms/gravity/protocol/openid-connect/token
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/gravity
          jwk-set-uri: http://localhost:8080/realms/gravity/protocol/openid-connect/certs

server:
  port: 8086

logging:
  level:
    org.springframework: INFO

app:
  keycloak:
    realm: gravity
    serverUrl: http://localhost:8080

management:
  endpoints:
    web:
      exposure:
        include: health,info