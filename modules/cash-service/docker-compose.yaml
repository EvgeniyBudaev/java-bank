version: "3.8"

services:
  cash-service:
    build: .
    ports:
      - "${CASH_SERVICE_PORT}:${CASH_SERVICE_PORT}"
    environment:
      CASH_SERVICE_PORT: ${CASH_SERVICE_PORT}
      CASH_SERVICE_LOGGER_LEVEL: ${CASH_SERVICE_LOGGER_LEVEL}
      CASH_SERVICE_KEYCLOAK_REALM: ${CASH_SERVICE_KEYCLOAK_REALM}
      CASH_SERVICE_KEYCLOAK_BASE_URL: ${CASH_SERVICE_KEYCLOAK_BASE_URL}

