spring:
  application:
    name: notification-service
  config:
    import: "optional:consul:"
  cloud:
    consul:
      host: ${CONSUL_HOST:localhost}
      port: ${CONSUL_PORT:8500}
      discovery:
        enabled: true
        register: true
        instance-id: "${spring.application.name}:${server.port}:${random.value}"
        health-check-path: /actuator/health
        health-check-interval: 10s
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driverClassName: org.postgresql.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${app.keycloak.serverUrl}/realms/${app.keycloak.realm}
  task:
    scheduling:
      pool:
        size: 5        # Размер пула потоков для задач
      thread-name-prefix: scheduler-

server:
  port: ${NOTIFICATION_SERVICE_PORT}

logging:
  level:
    org.springframework: ${NOTIFICATION_SERVICE_LOGGER_LEVEL}

app:
  keycloak:
    realm: ${KEYCLOAK_REALM}
    serverUrl: ${KEYCLOAK_BASE_URL}

management:
  endpoints:
    web:
      exposure:
        include: health,info

notification:
  idempotency:
#    retention-days: 7  # Вариант для production - 7 дней хранить ключи
    retention-days: 0  # 0 дней
    retention-minutes: 1 # 1 минута