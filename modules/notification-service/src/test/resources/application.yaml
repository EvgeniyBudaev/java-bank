spring:
  application:
    name: notification-service
  config:
    import: "" # Отключаем импорт из Consul
  cloud:
    consul:
      enabled: false
      discovery:
        enabled: false
        register: false
        instance-id: "${spring.application.name}:${server.port}:${random.value}"
        healthCheckPath: /actuator/health
        healthCheckInterval: 30s
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: root
    driverClassName: org.postgresql.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8181/realms/myrealm
  task:
    scheduling:
      pool:
        size: 5
      thread-name-prefix: scheduler-

server:
  port: 8085

logging:
  level:
    org.springframework: INFO

app:
  keycloak:
    realm: gravity
    serverUrl: http://localhost:8181

management:
  endpoints:
    web:
      exposure:
        include: health,info

notification:
  idempotency:
    retention-days: 0
    retention-minutes: 1