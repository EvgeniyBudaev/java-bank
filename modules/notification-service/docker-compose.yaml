version: "3.8"

services:
  notification-service:
    build: .
    ports:
      - "${NOTIFICATION_SERVICE_PORT}:${NOTIFICATION_SERVICE_PORT}"
    environment:
      NOTIFICATION_SERVICE_PORT: ${NOTIFICATION_SERVICE_PORT}
      NOTIFICATION_SERVICE_LOGGER_LEVEL: ${NOTIFICATION_SERVICE_LOGGER_LEVEL}
      NOTIFICATION_SERVICE_KEYCLOAK_REALM: ${NOTIFICATION_SERVICE_KEYCLOAK_REALM}
      NOTIFICATION_SERVICE_KEYCLOAK_BASE_URL: ${NOTIFICATION_SERVICE_KEYCLOAK_BASE_URL}
