version: "3.8"

services:
  gateway-service:
    build: .
    ports:
      - "${GATEWAY_SERVICE_PORT}:${GATEWAY_SERVICE_PORT}"
    environment:
      GATEWAY_SERVICE_PORT: ${GATEWAY_SERVICE_PORT}
      GATEWAY_SERVICE_LOGGER_LEVEL: ${GATEWAY_SERVICE_LOGGER_LEVEL}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_BASE_URL: ${KEYCLOAK_BASE_URL}
