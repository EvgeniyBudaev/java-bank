version: "3.8"

services:
  gateway-service:
    container_name: gateway-service
    hostname: gateway-service
    networks:
      - web-network
    build:
      context: .
    restart: always
    ports:
      - "8082:8082"
    environment:
      GATEWAY_SERVICE_PORT: 8082
      GATEWAY_SERVICE_LOGGER_LEVEL: INFO
      KEYCLOAK_REALM: gravity
      KEYCLOAK_BASE_URL: http://keycloak:8080
      CONSUL_HOST: consul
      CONSUL_PORT: 8500

networks:
  web-network:
    external: true