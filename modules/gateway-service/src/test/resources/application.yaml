spring:
  application:
    name: gateway-service
#  config:
#    import: "optional:consul:"
#  cloud:
#    consul:
#      host: localhost
#      port: 8500
#      discovery:
#        enabled: true
#        register: true
#        instance-id: "${spring.application.name}:${server.port}:${random.value}"
#        health-check-path: /actuator/health
#        health-check-interval: 10s
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8181/realms/myrealm
          jwk-set-uri: http://keycloak:8080/realms/myrealm/protocol/openid-connect/certs
      client:
        provider:
          keycloak:
            token-uri: http://keycloak:8080/realms/myrealm/protocol/openid-connect/token
            authorization-uri: http://localhost:8181/realms/myrealm/protocol/openid-connect/auth
            user-info-uri: http://keycloak:8080/realms/myrealm/protocol/openid-connect/userinfo
            jwk-set-uri: http://keycloak:8080/realms/myrealm/protocol/openid-connect/certs
            user-name-attribute: preferred_username

server:
  port: 8082

logging:
  level:
    org.springframework: INFO

app:
  keycloak:
    realm: gravity
    externalUrl: http://localhost:8181
    internalUrl: http://keycloak:8080

management:
  endpoints:
    web:
      exposure:
        include: health,info