version: "3.8"

services:
  keycloak:
    container_name: keycloak
    image: quay.io/keycloak/keycloak:24.0.2
    networks:
      - web-network
    build:
      context: ./keycloak
    ports:
      - "8080:8080"
    environment:
      - KEYCLOAK_ADMIN=root
      - KEYCLOAK_ADMIN_PASSWORD=root
      - KC_HEALTH_ENABLED=true
      - KC_LOG_LEVEL=INFO
      - KC_PROXY=edge
    volumes:
      - keycloakdata:/opt/keycloak/data/
    restart: unless-stopped
    command: ["start-dev"]

networks:
  web-network:
    external: true

volumes:
  keycloakdata:
